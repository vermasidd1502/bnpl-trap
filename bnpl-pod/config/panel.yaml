# ---------------------------------------------------------------------------
# Firm panel — single source of truth for ingest + empirical analysis.
# Groups align with MASTERPLAN_V2.md §1.1 / §6.1.
# CIKs looked up against SEC EDGAR; trust CIKs use the sponsor when the
# underlying trust is a pass-through entity.
# ---------------------------------------------------------------------------

backtest_window:
  start: 2019-01-01
  end:   # null -> "today" at run time

# --- T: Treated (BNPL issuers) ---------------------------------------------
treated:
  - ticker: AFRM
    name: Affirm Holdings
    cik: "0001820953"
    trust_family: AFRMMT          # Affirm Asset Securitization Trust series
    notes: Primary target; junior tranche is the TRS short candidate.
  - ticker: SQ                    # Block Inc. (parent of Afterpay)
    name: Block / Afterpay
    cik: "0001512673"
    trust_family: AFTR
  - ticker: PYPL
    name: PayPal (Pay in 4 sleeve)
    cik: "0001633917"
    trust_family: null            # not separately securitized; 10-Q segment only
  - ticker: SEZL
    name: Sezzle
    cik: "0001662991"
    trust_family: null
  - ticker: ZIP.AX                # ASX-listed; ADR data sparse
    name: Zip Co
    cik: null                     # non-US; use 20-F / AU filings
    trust_family: null
  - ticker: UPST
    name: Upstart (consumer-loan sleeve)
    cik: "0001647639"
    trust_family: UPSTR

# --- S: Sentiment-only panel (not in quant DiD; alt-data layers only) ------
# Private / non-US issuers with no usable 10-Q / options / ABS-via-EDGAR.
# These entities show up in Reddit sentiment, Google Trends buckets, and
# LinkedIn/X vitality — but are EXCLUDED from Granger, JT calibration,
# Mean-CVaR sizing, and backtest P&L.
sentiment_only:
  - ticker: null
    name: Klarna
    cik: null
    trust_family: null
    notes: Private (IPO pending); sentiment + Trends layers only.

