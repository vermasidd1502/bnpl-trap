<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>BNPL·POD · Institutional Terminal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070a10;
    --card: #0b111b;
    --cardAlt: #0e1524;
    --border: #1c2433;
    --borderHi: #2a3448;
    --text: #cfd6e4;
    --dim: #6b7689;
    --muted: #9aa3b5;
    --cyan: #22d3ee;
    --amber: #f59e0b;
    --crimson: #e11d48;
  }
  html, body { background: var(--bg); color: var(--text); }
  body { font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; font-feature-settings: "ss01","cv11","tnum"; letter-spacing: -0.005em; }
  .font-mono, .font-mono *, code, pre { font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-feature-settings: "ss02","zero"; }
  .shadow-inner-card {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.02),
      inset 0 -1px 0 rgba(0,0,0,0.35),
      0 1px 0 rgba(0,0,0,0.4);
  }
  /* ticker scroll */
  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .ticker-track { animation: tickerScroll 80s linear infinite; }
  /* agent row fade */
  @keyframes rowFadeIn {
    from { background: rgba(34,211,238,0.08); opacity: 0.2; }
    to   { background: transparent; opacity: 1; }
  }
  .row-fade-in { animation: rowFadeIn 900ms ease-out; }
  /* scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #1a2232; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a3448; }
  /* recharts tooltip tweaks */
  .recharts-tooltip-wrapper { outline: none !important; }
  .recharts-cartesian-axis-tick text { font-family: 'Geist Mono', monospace; }
  /* selection */
  ::selection { background: rgba(34,211,238,0.3); }
</style>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: 'var(--bg)', card: 'var(--card)', cardAlt: 'var(--cardAlt)',
          border: 'var(--border)', borderHi: 'var(--borderHi)',
          text: 'var(--text)', dim: 'var(--dim)', muted: 'var(--muted)',
        },
        fontFamily: {
          sans: ['Geist', 'system-ui', 'sans-serif'],
          mono: ['Geist Mono', 'monospace'],
        },
      },
    },
  };
</script>
</head>
<body class="antialiased">
<div id="root"></div>

<!-- React + Babel (pinned, with SRI) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- recharts (UMD) -->
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

<!-- Inline icon set (original minimal outlined icons, lucide-style) -->
<script>
  (function(){
    const PATHS = {
      Activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
      LineChart: '<path d="M3 3v18h18"/><polyline points="7 14 11 10 14 13 20 7"/>',
      AreaChart: '<path d="M3 3v18h18"/><path d="M7 16l4-5 3 3 6-7v9H7z"/>',
      ListChecks: '<path d="M10 6h11M10 12h11M10 18h11"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/>',
      CalendarClock: '<rect x="3" y="5" width="14" height="16" rx="2"/><path d="M3 9h14M8 3v4M14 3v4"/><circle cx="18" cy="14" r="4"/><path d="M18 12v2l1.5 1"/>',
      Database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v6c0 1.7 4 3 9 3s9-1.3 9-3V5"/><path d="M3 11v6c0 1.7 4 3 9 3s9-1.3 9-3v-6"/>',
      Wifi: '<path d="M5 12.5a12 12 0 0 1 14 0"/><path d="M8 16a7 7 0 0 1 8 0"/><circle cx="12" cy="19.5" r="0.8" fill="currentColor"/><path d="M2 9a18 18 0 0 1 20 0"/>',
      ShieldCheck: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>',
      Command: '<path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/>',
      Radar: '<circle cx="12" cy="12" r="9"/><path d="M12 12l7-5"/><path d="M12 12v9"/><path d="M12 12l-6 3"/>',
      Table: '<rect x="3" y="4" width="18" height="16" rx="1"/><path d="M3 10h18M3 16h18M9 4v16M15 4v16"/>',
      Terminal: '<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>',
      Rewind: '<polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/>',
      HelpCircle: '<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
      Zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
      Gauge: '<path d="M12 14l4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/>',
      Activity2: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
      FlaskConical: '<path d="M10 2v7.31"/><path d="M14 9.3V2"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/>',
      Brain: '<path d="M9 5a3 3 0 1 0-6 0c0 1.66 1.34 3 3 3v5a5 5 0 0 0 10 0V8a3 3 0 1 0-3-3"/><path d="M9 5h6"/>',
    };
    const Icon = (path) => (props) => {
      const { size=14, color='currentColor', strokeWidth=1.5, className, style } = props || {};
      return React.createElement('svg', {
        width: size, height: size, viewBox:'0 0 24 24',
        fill:'none', stroke: color, strokeWidth,
        strokeLinecap:'round', strokeLinejoin:'round',
        className, style,
        dangerouslySetInnerHTML: { __html: path },
      });
    };
    const out = {};
    Object.keys(PATHS).forEach(k => out[k] = Icon(PATHS[k]));
    const blank = (props) => {
      const { size=14 } = props || {};
      return React.createElement('svg', { width: size, height: size, viewBox:'0 0 24 24' });
    };
    window.lucide = new Proxy(out, { get(t, p){ return p in t ? t[p] : blank; } });
  })();
</script>

<script type="text/babel" src="PodTerminal.tsx" data-presets="typescript,react"></script>
<script type="text/babel" data-presets="typescript,react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(window.PodTerminal));
</script>
</body>
</html>
